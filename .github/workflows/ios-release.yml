name: iOS Release (App Store / TestFlight)

# Builds a signed .ipa and uploads it to TestFlight.
#
# Requires these repository secrets (Settings -> Secrets and variables -> Actions):
#   APP_STORE_CONNECT_KEY_ID       App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID    App Store Connect API issuer ID
#   APP_STORE_CONNECT_PRIVATE_KEY  Contents of the AuthKey_XXXX.p8 file (paste as-is)
#   APPLE_TEAM_ID                  Your 10-character Apple Developer Team ID
#   GOOGLE_SERVICE_INFO_PLIST      Base64 of GoogleService-Info.plist (required)
#   FIREBASE_WEB_CONFIG            Optional one-line JSON firebaseConfig; if unset,
#                                  CI derives it from GoogleService-Info.plist
#
# Signing strategy:
#   Archive WITH automatic signing + App Store Connect API auth.
#   Do NOT set CODE_SIGNING_ALLOWED=NO — that strips `aps-environment` and
#   breaks APNs on device.
#   Do NOT force CODE_SIGN_IDENTITY="Apple Distribution" at archive time —
#   that conflicts with Automatic ("signed for development, but conflicting
#   identity Apple Distribution"). Archive uses Automatic; exportArchive with
#   method=app-store re-signs with Distribution for TestFlight.
#   Keep CODE_SIGN_ENTITLEMENTS=App/App.entitlements so Push is embedded.
#
# One-time cleanup if the account is already at the Development cert limit:
#   Apple Developer → Certificates → revoke unused "Apple Development" certs
#   (especially ones named like "Created via API"), then re-run this workflow.
#
# Also required in Apple Developer → Identifiers → com.confast.essences:
#   enable Push Notifications (and Live Activities if listed).
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Capacitor 8's precompiled Swift frameworks require Xcode 26, which is
      # also mandatory for App Store submissions.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      # Plist must exist before: (1) Vite web config derivation, (2) setup_widget wiring.
      # Missing plist → FirebaseMessaging.configure() crashes the app on launch.
      # Missing web config → Firestore never written (remote Live Activity broken).
      - name: Write GoogleService-Info.plist from secret
        env:
          PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$PLIST_B64" ]; then
            echo "GOOGLE_SERVICE_INFO_PLIST is required for release builds"
            exit 1
          fi
          echo "$PLIST_B64" | base64 --decode > ios/App/App/GoogleService-Info.plist
          grep -q "GOOGLE_APP_ID\|API_KEY\|GCM_SENDER_ID" ios/App/App/GoogleService-Info.plist \
            || { echo "Decoded file does not look like GoogleService-Info.plist"; exit 1; }

      - name: Resolve Firebase web config for Vite
        env:
          FIREBASE_WEB_CONFIG: ${{ secrets.FIREBASE_WEB_CONFIG }}
        run: node scripts/build-firebase-web-config.mjs --write-env

      - name: Build web assets
        run: npm run build

      - name: Verify Firebase web config was baked into the bundle
        run: |
          # Vite inlines import.meta.env.VITE_* as string literals.
          grep -R --include='*.js' -l 'todolist-app-project-4fd37' dist \
            || { echo "Built JS does not contain Firebase projectId — VITE_FIREBASE_WEB_CONFIG missing at build time"; exit 1; }

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Fix SPM Package.swift paths / guard app identity collision
        run: node scripts/ensure-spm-firebase-app-link.mjs

      - name: Wire Live Activity widget extension
        working-directory: ios/App
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: ruby ../scripts/setup_widget.rb

      - name: Verify APNsDeviceTokenCache is in the Xcode project
        run: |
          grep -q 'APNsDeviceTokenCache.swift' ios/App/App.xcodeproj/project.pbxproj \
            || { echo "APNsDeviceTokenCache.swift not in Xcode project — FCM APNs race fix missing"; exit 1; }

      - name: Verify GoogleService-Info.plist is in the Xcode project
        run: |
          grep -q "GoogleService-Info.plist" ios/App/App.xcodeproj/project.pbxproj \
            || { echo "GoogleService-Info.plist was not added to the Xcode project"; exit 1; }
          test -f ios/App/App/GoogleService-Info.plist

      - name: Verify LiveActivities + Firebase plugins are registered
        run: |
          for name in LiveActivitiesPlugin FirebaseMessagingPlugin AppPlugin; do
            grep -q "$name" ios/App/App/capacitor.config.json \
              || { echo "$name missing from packageClassList"; exit 1; }
          done
          grep -q 'LiveActivitiesPlugin.swift' ios/App/App.xcodeproj/project.pbxproj \
            || { echo "LiveActivitiesPlugin.swift not in Xcode project"; exit 1; }
          grep -q 'CapacitorFirebaseMessaging' ios/App/CapApp-SPM/Package.swift \
            || { echo "CapacitorFirebaseMessaging missing from CapApp-SPM/Package.swift — FCM tokens will be null"; exit 1; }
          grep -q 'VendoredAppPlugin' ios/App/CapApp-SPM/Package.swift \
            || { echo "VendoredAppPlugin missing — AppPlugin must be vendored to avoid SPM identity app"; exit 1; }
          if grep -E 'path: "[^"]*/app"' ios/App/CapApp-SPM/Package.swift; then
            echo "Package.swift still has a path ending in /app — SPM identity collision"
            exit 1
          fi
          test -f ios/App/CapApp-SPM/Sources/VendoredAppPlugin/AppPlugin.swift \
            || { echo "Missing vendored AppPlugin.swift"; exit 1; }
          echo "---- CapApp-SPM/Package.swift ----"
          cat ios/App/CapApp-SPM/Package.swift

      - name: Verify CODE_SIGN_ENTITLEMENTS is set on App target
        run: |
          grep -q 'CODE_SIGN_ENTITLEMENTS = App/App.entitlements' ios/App/App.xcodeproj/project.pbxproj \
            || { echo "CODE_SIGN_ENTITLEMENTS missing — aps-environment will not be signed into the app"; exit 1; }
          grep -q 'aps-environment' ios/App/App/App.entitlements \
            || { echo "App.entitlements missing aps-environment"; exit 1; }

      - name: Prepare App Store Connect API key
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          KEY_PATH=~/private_keys/AuthKey_${KEY_ID}.p8
          printf '%s\n' "$PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          grep -q "BEGIN PRIVATE KEY" "$KEY_PATH" || { echo "Invalid .p8 key in APP_STORE_CONNECT_PRIVATE_KEY secret"; exit 1; }

      - name: Generate ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          EOF

      - name: Archive (automatic signing + entitlements)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Sign at archive time so aps-environment is embedded. Do not force
          # CODE_SIGN_IDENTITY=Apple Distribution here — it conflicts with
          # Automatic signing (development vs distribution). Export to
          # app-store below re-signs with Distribution.
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Essences.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements"

      - name: Export .ipa (sign + provision)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Essences.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Verify IPA contains aps-environment entitlement
        run: |
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n 1)
          test -n "$IPA" || { echo "No IPA exported"; exit 1; }
          rm -rf "$RUNNER_TEMP/ipa-check"
          mkdir -p "$RUNNER_TEMP/ipa-check"
          unzip -q "$IPA" -d "$RUNNER_TEMP/ipa-check"
          APP=$(find "$RUNNER_TEMP/ipa-check/Payload" -maxdepth 1 -name '*.app' | head -n 1)
          echo "---- codesign entitlements ----"
          codesign -d --entitlements :- "$APP" 2>/dev/null | tee "$RUNNER_TEMP/entitlements.xml"
          grep -q 'aps-environment' "$RUNNER_TEMP/entitlements.xml" \
            || { echo "FATAL: exported IPA is missing aps-environment — Push/FCM will fail on device"; exit 1; }
          echo "aps-environment OK in IPA"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app -f "$RUNNER_TEMP/export/App.ipa" \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Essences-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
