name: iOS Simulator Build

# Validates that the app + Live Activity widget compile for iOS, without any
# Apple Developer account or code signing. Runs on every push to main.
# (Public repos: free Actions minutes; re-run after private-minute limit hits.)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-simulator-build.yml"

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Capacitor 8's precompiled Swift frameworks require Xcode 26.
      # Building with an older Xcode breaks plugin APIs (e.g. StatusBar).
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: Write GoogleService-Info.plist from secret
        env:
          PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$PLIST_B64" ]; then
            echo "GOOGLE_SERVICE_INFO_PLIST secret not set — skipping (local LA still builds)."
            exit 0
          fi
          echo "$PLIST_B64" | base64 --decode > ios/App/App/GoogleService-Info.plist
          grep -q "GOOGLE_APP_ID\|API_KEY\|GCM_SENDER_ID" ios/App/App/GoogleService-Info.plist \
            || { echo "Decoded file does not look like GoogleService-Info.plist"; exit 1; }
          echo "Wrote ios/App/App/GoogleService-Info.plist"

      - name: Resolve Firebase web config for Vite
        env:
          FIREBASE_WEB_CONFIG: ${{ secrets.FIREBASE_WEB_CONFIG }}
        run: |
          if [ ! -f ios/App/App/GoogleService-Info.plist ] && [ -z "$FIREBASE_WEB_CONFIG" ]; then
            echo "No plist / FIREBASE_WEB_CONFIG — building without remote Firebase (simulator OK)."
            exit 0
          fi
          node scripts/build-firebase-web-config.mjs --write-env

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Wire Live Activity widget extension
        working-directory: ios/App
        run: ruby ../scripts/setup_widget.rb

      - name: Verify LiveActivitiesPlugin is registered with Capacitor
        run: |
          grep -q 'LiveActivitiesPlugin' ios/App/App/capacitor.config.json \
            || { echo "LiveActivitiesPlugin missing from packageClassList"; exit 1; }
          for name in CapacitorFirebaseMessaging CapacitorFirebaseApp; do
            grep -q "$name" ios/App/CapApp-SPM/Package.swift \
              || { echo "$name missing from CapApp-SPM/Package.swift"; exit 1; }
          done

      - name: Show schemes
        run: xcodebuild -list -project ios/App/App.xcodeproj

      - name: Build for iOS Simulator (unsigned)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO
