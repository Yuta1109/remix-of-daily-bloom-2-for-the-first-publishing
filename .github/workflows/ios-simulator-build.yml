name: iOS Simulator Build

# Validates that the app + Live Activity widget compile for iOS, without any
# Apple Developer account or code signing. Runs on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-simulator-build.yml"

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Capacitor 8's precompiled Swift frameworks require Xcode 26.
      # Building with an older Xcode breaks plugin APIs (e.g. StatusBar).
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: Wire Live Activity widget extension
        working-directory: ios/App
        run: ruby ../scripts/setup_widget.rb

      - name: Show schemes
        run: xcodebuild -list -project ios/App/App.xcodeproj

      - name: Build for iOS Simulator (unsigned)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO
